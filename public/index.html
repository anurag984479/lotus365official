<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lotus365 Login</title>
  <style>
    body {
      background: #2e8b62;
      font-family: Arial, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: #1f6b4a;
      padding: 30px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 2px;
    }
    .logo span:first-child { color: #fff; }
    .logo span:last-child { color: #f5c800; }
    h2 {
      margin-top: 10px;
      font-size: 22px;
      font-weight: 700;
    }
    .input-group {
      margin: 15px 0;
      text-align: left;
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #f5c800;
      border-radius: 6px;
      background: transparent;
      color: #fff;
      font-size: 15px;
    }
    .input-group input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-login { background: #fff; color: #000; }
    .btn-demo { background: #f5c800; color: #000; }
    .btn-apk { background: #555; color: #fff; }
    .footer {
      margin-top: 20px;
      font-size: 14px;
    }
    .footer a {
      color: #f5c800;
      text-decoration: underline;
      font-weight: 700;
    }
    .contact {
      margin-top: 15px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo"><span>LOTUS</span><span>365</span></div>
    <h2>Login</h2>

    <form action="/login" method="POST">
      <div class="input-group">
        <input type="text" name="username" placeholder="Enter Username*" required>
      </div>
      <div class="input-group">
        <input type="password" name="password" placeholder="Enter Password*" required>
      </div>

      <button type="submit" class="btn btn-login">LOGIN</button>
      <button type="button" class="btn btn-demo">LOGIN WITH DEMO ID</button>
      <button type="button" class="btn btn-apk">Download APK</button>
    </form>

    <div class="footer">
      Don't Have An Account? <a href="#">Register</a>
    </div>
    <div class="contact">
      LOTUSOFFICIALL365@GMAIL.COM<br>
      Powered by betfair
    </div>
  </div>

</body>
</html>
