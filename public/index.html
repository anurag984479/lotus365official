<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lotus365 Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #b0b0b0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
      opacity: 1;
    }
    input[type="radio"] {
      accent-color: #f5c800;
      width: 17px;
      height: 17px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div style="background:#2e8b62;border-radius:18px;padding:26px 22px 24px;width:100%;max-width:390px;position:relative;">

  <button style="position:absolute;top:14px;right:14px;background:#f5c800;border:none;border-radius:50%;width:40px;height:40px;font-size:22px;font-weight:900;cursor:pointer;color:#000;line-height:1;display:flex;align-items:center;justify-content:center;">✕</button>

  <div style="text-align:center;margin-bottom:6px;">
    <div style="font-size:40px;font-weight:900;letter-spacing:2px;line-height:1.1;">
      <span style="color:#fff;">LOTUS</span><span style="color:#f5c800;">365</span>
    </div>
    <div style="color:#fff;font-size:20px;font-weight:700;margin-top:6px;">Login</div>
  </div>

  <div style="display:flex;border:2px solid #f5c800;border-radius:8px;overflow:hidden;margin:18px 0 20px;">
    <button style="flex:1;padding:13px 0;background:#f5c800;border:none;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:#000;">
      Mobile Number
    </button>
    <button style="flex:1;padding:13px 0;background:transparent;border:none;font-size:15px;font-weight:600;cursor:pointer;color:#b0d4c0;">
      User ID
    </button>
  </div>

  <!-- ✅ FORM START -->
  <form action="/login" method="POST">

    <div style="display:flex;align-items:center;border-bottom:2px solid #f5c800;margin-bottom:18px;padding-bottom:10px;">
      <span style="color:#fff;font-size:16px;font-weight:700;">+91</span>
      <span style="color:#fff;font-size:14px;margin:0 12px 0 4px;font-weight:700;">▾</span>
      <input type="tel" name="mobile" placeholder="Enter Mobile Number*" style="flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:15px;" required/>
    </div>

    <!-- Only Password option -->
    <div style="display:flex;align-items:center;gap:22px;margin-bottom:14px;">
      <label style="display:flex;align-items:center;gap:7px;cursor:pointer;color:#fff;font-size:15px;font-weight:500;">
        <input type="radio" name="auth" value="password" checked/> Password
      </label>
    </div>

    <div style="display:flex;align-items:center;border-bottom:2px solid #f5c800;margin-bottom:10px;padding-bottom:10px;">
      <input type="password" name="password" placeholder="Enter Password*" style="flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:15px;" required/>
    </div>

    <div style="text-align:right;margin-bottom:20px;">
      <a href="#" style="color:#fff;font-size:13px;text-decoration:underline;">Forgot Password?</a>
    </div>

    <!-- Centered Log In button -->
    <div style="text-align:center;margin-bottom:18px;">
      <button type="submit" style="background:#f5c800;border:none;border-radius:8px;padding:15px 40px;font-size:15px;font-weight:700;cursor:pointer;color:#000;">Log In</button>
    </div>

  </form>
  <!-- ✅ FORM END -->

  <div style="text-align:center;color:#fff;font-size:15px;font-weight:700;margin-bottom:12px;">Or Continue With Whatsapp</div>

  <button style="width:100%;background:#3ab862;border:none;border-radius:50px;padding:16px 0;font-size:17px;font-weight:700;cursor:pointer;color:#fff;margin-bottom:20px;">
    Whatsapp Now
  </button>

  <!-- Social login section removed -->

  <div style="text-align:center;color:#fff;font-size:15px;">
    Don't Have An Account <a href="#" style="color:#f5c800;font-weight:700;text-decoration:underline;">Register</a>
  </div>

</div>
</body>
</html>
